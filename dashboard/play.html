<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tic-Tac-Toe Hall</title>
  <style>
    html, body {
      margin: 0; padding: 0; height: 100%;
      background: #07080d; color: #e8dcc8;
      font-family: 'Crimson Pro', 'Georgia', serif;
      overflow: hidden;
    }
    #frame {
      width: 100%; height: 100vh; border: 0; display: block;
      background: #07080d;
    }
    .splash {
      position: fixed; inset: 0;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      gap: 0.65rem;
      background: #07080d;
      transition: opacity 0.35s ease;
    }
    .splash--hidden { opacity: 0; pointer-events: none; }
    .splash__rune {
      font-size: 2.5rem; color: #c9a84c;
      animation: pulse 1.6s ease-in-out infinite;
    }
    .splash__line {
      font-size: 0.95rem; letter-spacing: 0.04em;
      opacity: 0.78;
    }
    .splash__error {
      max-width: 520px; padding: 0 1.5rem; text-align: center;
      color: #e05a5a; font-size: 0.86rem;
    }
    @keyframes pulse {
      0%, 100% { opacity: 0.55; }
      50%      { opacity: 1; }
    }
  </style>
</head>
<body>
  <div class="splash" id="splash">
    <div class="splash__rune">⚔</div>
    <div class="splash__line" id="splash-line">Connecting to the hall…</div>
  </div>
  <iframe
    id="frame"
    sandbox="allow-scripts allow-same-origin allow-forms allow-popups allow-popups-to-escape-sandbox"
    referrerpolicy="no-referrer"
    loading="eager"
    style="display:none;"
    title="Tic-Tac-Toe Hall"></iframe>

  <script src="/static/mmo-maid-sdk.js"></script>
  <script>
    (function () {
      var frame  = document.getElementById("frame");
      var splash = document.getElementById("splash");
      var line   = document.getElementById("splash-line");

      function showError(msg) {
        line.className = "splash__error";
        line.textContent = "Couldn't open the hall: " + msg;
      }

      // The platform's outer iframe defaults to ~400px which clips the game
      // lobby. Ask for a generous height that fits the table list + active
      // table. The bridge clamps this to the [200, 5000] range so a typo
      // can't break the dashboard layout.
      function requestTallIframe() {
        if (window.MaidSDK && typeof MaidSDK.resize === "function") {
          MaidSDK.resize(900);
        }
      }

      // The SDK proxies our RPC to the parent dashboard, which forwards it
      // to the plugin's `dashboard.get_play_iframe_url` handler. The handler
      // returns a JWT-signed lobby URL bound to this user's Discord identity.
      // Note: MaidSDK.rpc() auto-prepends "dashboard." to the method name,
      // so we pass just "get_play_iframe_url" (not the full prefixed form).
      MaidSDK.ready(function () {
        requestTallIframe();
        MaidSDK.rpc("get_play_iframe_url", {})
          .then(function (data) {
            var url = (data && data.url) || "";
            if (!url) {
              // Surface the real reason if the handler attached one — saves
              // the dev from grep-ing logs every time.
              var reason = (data && data.error)
                ? data.error
                : "game server returned no URL";
              showError(reason);
              return;
            }
            frame.addEventListener("load", function () {
              splash.classList.add("splash--hidden");
            }, { once: true });
            frame.src = url;
            frame.style.display = "block";
          })
          .catch(function (err) {
            showError(err && err.message ? err.message : "unknown error");
          });
      });
    })();
  </script>
</body>
</html>
